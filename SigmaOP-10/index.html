<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video, audio, images and iframe usage</title>
    <meta name="description" content="This is a webpage that demonstrates the usage of video, audio, images, and iframes in HTML. It includes examples of how to embed multimedia content and display images on a webpage. The page also showcases how to use iframes to embed external content such as videos or other web pages.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>My Multimedia Page</h1>
    <h2>Video Example</h2>
    <video src="vid.mp4.mp4" width="320" height="240" controls>
        
    </video>
    <h2>Audio Example</h2>
    <audio controls>
        <source src="sample-audio.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <h2>Image Example</h2>
    <img src="image.png" alt="Sample Image" width="300">
    <h2>Iframe Example</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=g1oP-eCMBJsD5xLK" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
